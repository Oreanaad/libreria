<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña — Booksflea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;0,900;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#FEFDFB;
  --paper2:#F3E9D7;
  --card:#FFFFFF;
  --navy:#2B2216;
  --forest:#B8863E;
  --ink:#2E2820;
  --muted:#746754;
  --border:rgba(184,134,62,.24);
  --grad:linear-gradient(135deg,#8A6A35,#B8894B);
}

body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden;line-height:1.65}
.container{max-width:1200px;margin:0 auto;padding:0 24px}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:22px 0;background:rgba(254,253,251,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:1.5rem;letter-spacing:.5px;color:var(--navy);text-decoration:none;display:flex;align-items:center;gap:8px}
.logo em{font-style:italic;color:var(--forest)}
.nav-cta{background:var(--grad);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:.85rem;text-decoration:none;letter-spacing:.3px}

#auth-section{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:130px 20px 60px}
.auth-box{width:100%;max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px 40px;box-shadow:0 30px 60px rgba(43,34,22,.1);position:relative;overflow:hidden}
.auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad)}
.auth-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;color:var(--navy);margin-bottom:8px;text-align:center}
.auth-sub{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:28px}
.f-row{margin-bottom:16px}
.f-row label{display:block;font-size:.74rem;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase}
.f-row input{width:100%;background:var(--paper2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-family:'Inter',sans-serif;font-size:.92rem;color:var(--ink);outline:none;transition:border-color .3s}
.f-row input:focus{border-color:var(--forest)}
.auth-submit{width:100%;background:var(--grad);color:#fff;border:none;border-radius:100px;padding:14px;font-family:'Inter',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.3px;cursor:pointer;transition:all .3s;margin-top:6px}
.auth-submit:hover{opacity:.88;transform:translateY(-2px)}
.auth-submit:disabled{opacity:.6;cursor:not-allowed;transform:none}
.auth-msg{font-size:.82rem;padding:11px 14px;border-radius:8px;margin-bottom:16px;display:none}
.auth-msg.error{display:block;background:rgba(180,60,40,.08);color:#a8402a;border:1px solid rgba(180,60,40,.2)}
.auth-msg.success{display:block;background:rgba(60,120,80,.08);color:#2f6b47;border:1px solid rgba(60,120,80,.2)}
.auth-back{display:block;text-align:center;margin-top:22px;font-size:.82rem;color:var(--muted);text-decoration:none}
.auth-back:hover{color:var(--navy)}
</style>
</head>
<body>

<nav>
  <div class="container">
    <div class="nav-inner">
      <a href="index.html" class="logo">📖 Books<em>flea</em></a>
      <a href="catalogo.html" class="nav-cta">Ver catálogo</a>
    </div>
  </div>
</nav>

<section id="auth-section">
  <div class="auth-box">
    <div id="formView">
      <h1 class="auth-title">Elegí tu nueva contraseña</h1>
      <p class="auth-sub">Mínimo 6 caracteres.</p>
      <div class="auth-msg" id="resetMsg"></div>
      <form id="resetForm">
        <div class="f-row">
          <label>Nueva contraseña</label>
          <input type="password" id="newPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <div class="f-row">
          <label>Confirmá la contraseña</label>
          <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required>
        </div>
        <button type="submit" class="auth-submit" id="resetSubmit">Restablecer contraseña</button>
      </form>
    </div>
    <div id="invalidView" style="display:none">
      <h1 class="auth-title">Enlace inválido</h1>
      <p class="auth-sub">Este enlace de restablecimiento no es válido o ya venció.</p>
    </div>
    <a href="login.html" class="auth-back">← Volver a iniciar sesión</a>
  </div>
</section>

<script src="auth.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('invalidView').style.display = '';
}

function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const msg = document.getElementById('resetMsg');
  msg.className = 'auth-msg';
  const pw = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  if (pw !== confirm) {
    showMsg(msg, 'Las contraseñas no coinciden.', 'error');
    return;
  }
  const btn = document.getElementById('resetSubmit');
  btn.disabled = true; btn.textContent = 'Guardando...';
  try {
    await authFetch('/auth/reset-password', {
      method: 'POST',
      body: JSON.stringify({ token, password: pw })
    });
    showMsg(msg, '¡Listo! Tu contraseña fue actualizada. Redirigiendo a iniciar sesión...', 'success');
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(() => { location.href = 'login.html'; }, 1800);
  } catch (err) {
    showMsg(msg, err.message, 'error');
    btn.disabled = false; btn.textContent = 'Restablecer contraseña';
  }
});
</script>
</body>
</html>
