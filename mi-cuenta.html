<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi cuenta — Booksflea</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;0,700;0,900;1,500;1,600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --paper:#FEFDFB;
  --paper2:#F3E9D7;
  --card:#FFFFFF;
  --navy:#2B2216;
  --navy-deep:#1C1610;
  --forest:#B8863E;
  --sage:#D8B879;
  --tan:#E8CE9E;
  --leather:#8F6A2E;
  --ink:#2E2820;
  --muted:#746754;
  --border:rgba(184,134,62,.24);
  --grad:linear-gradient(135deg,#8A6A35,#B8894B);
}

body{font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);overflow-x:hidden;line-height:1.65}
.container{max-width:900px;margin:0 auto;padding:0 24px}
.serif{font-family:'Fraunces',serif}
.accent{color:var(--forest);font-style:italic}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:22px 0;background:rgba(254,253,251,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{font-family:'Fraunces',serif;font-weight:600;font-size:1.5rem;letter-spacing:.5px;color:var(--navy);text-decoration:none;display:flex;align-items:center;gap:8px}
.logo em{font-style:italic;color:var(--forest)}
.nav-cta{background:var(--grad);color:#fff;padding:10px 22px;border-radius:100px;font-weight:700;font-size:.85rem;text-decoration:none;letter-spacing:.3px;transition:opacity .3s,transform .2s;white-space:nowrap}
.nav-cta:hover{opacity:.88;transform:translateY(-1px)}
.nav-logout{background:transparent;border:1.5px solid var(--navy);color:var(--navy);padding:9px 20px;border-radius:100px;font-family:'Inter',sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;transition:all .25s}
.nav-logout:hover{background:var(--navy);color:#fff}

/* ACCOUNT */
#account{padding:130px 0 90px}
.account-header{margin-bottom:44px}
.account-eyebrow{display:block;font-size:.78rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--forest);margin-bottom:10px}
.account-title{font-family:'Fraunces',serif;font-size:clamp(1.7rem,3.2vw,2.4rem);font-weight:600;color:var(--navy)}
.account-email{color:var(--muted);font-size:.9rem;margin-top:6px}

.orders-list{display:flex;flex-direction:column;gap:18px}
.order-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px 28px}
.order-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.order-id{font-family:'Fraunces',serif;font-weight:600;color:var(--navy);font-size:1rem}
.order-date{font-size:.78rem;color:var(--muted)}
.order-status{font-size:.68rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:5px 14px;border-radius:100px;background:rgba(184,134,62,.12);color:var(--forest)}
.order-items{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.order-item{display:flex;justify-content:space-between;font-size:.86rem;color:var(--ink)}
.order-item span:first-child{color:var(--muted)}
.order-total{display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid var(--border)}
.order-total b{font-family:'Fraunces',serif;font-size:1.2rem;color:var(--navy)}

.empty-orders{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-orders span{font-size:2.6rem;display:block;margin-bottom:16px}
.empty-orders a{color:var(--forest);font-weight:700;text-decoration:none;border-bottom:1px solid var(--forest)}

.loading{text-align:center;padding:80px 20px;color:var(--muted)}

@media(max-width:600px){
  #account{padding:110px 0 60px}
  .order-card{padding:20px}
}
</style>
</head>
<body>

<nav id="navbar">
  <div class="container" style="max-width:1200px">
    <div class="nav-inner">
      <a href="index.html" class="logo">📖 Books<em>flea</em></a>
      <div style="display:flex;gap:12px;align-items:center">
        <a href="catalogo.html" class="nav-cta">Ver catálogo</a>
        <button class="nav-logout" id="logoutBtn">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>

<section id="account">
  <div class="container">
    <div class="account-header">
      <span class="account-eyebrow">Mi cuenta</span>
      <h1 class="account-title" id="welcomeTitle">Hola <em class="accent">👋</em></h1>
      <p class="account-email" id="userEmail"></p>
    </div>

    <div id="ordersContainer">
      <div class="loading">Cargando tus pedidos...</div>
    </div>
  </div>
</section>

<script src="auth.js"></script>
<script>
if (!isLoggedIn()) {
  location.href = 'login.html?redirect=mi-cuenta.html';
}

const user = getUser();
if (user) {
  document.getElementById('welcomeTitle').innerHTML = `Hola, <em class="accent">${user.name.split(' ')[0]}</em>`;
  document.getElementById('userEmail').textContent = user.email;
}

document.getElementById('logoutBtn').addEventListener('click', logout);

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('es-VE', { day: 'numeric', month: 'long', year: 'numeric' });
}

async function loadOrders() {
  const container = document.getElementById('ordersContainer');
  try {
    const data = await authFetch('/orders');
    if (!data.orders.length) {
      container.innerHTML = `
        <div class="empty-orders">
          <span>📭</span>
          Todavía no tenés pedidos.<br>
          <a href="catalogo.html">Explorá el catálogo →</a>
        </div>`;
      return;
    }
    container.innerHTML = `<div class="orders-list">${data.orders.map(o => `
      <div class="order-card">
        <div class="order-top">
          <div>
            <div class="order-id">Pedido #${o.id}</div>
            <div class="order-date">${formatDate(o.created_at)}</div>
          </div>
          <span class="order-status">${o.status}</span>
        </div>
        <div class="order-items">
          ${o.items.map(i => `
            <div class="order-item">
              <span>${i.title}${i.qty > 1 ? ` × ${i.qty}` : ''}</span>
              <span>$${(i.price * i.qty).toFixed(2)}</span>
            </div>`).join('')}
        </div>
        <div class="order-total">
          <span>Total</span>
          <b>$${Number(o.total).toFixed(2)}</b>
        </div>
      </div>`).join('')}</div>`;
  } catch (err) {
    container.innerHTML = `<div class="empty-orders"><span>⚠️</span>${err.message}</div>`;
  }
}

if (isLoggedIn()) loadOrders();
</script>
</body>
</html>
